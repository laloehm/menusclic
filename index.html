<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Menusclic - La solución más rápida para digitalizar el menú de tu restaurante en la CDMX. Menús QR editables al instante, sin costos de impresión." />
    <title>Menusclic | Menús Digitales QR para Restaurantes en CDMX</title>

    <!-- DNS Prefetch & Preconnect para recursos externos -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://lh3.googleusercontent.com" crossorigin />
    <link rel="dns-prefetch" href="https://firestore.googleapis.com" />
    <link rel="dns-prefetch" href="https://images.unsplash.com" />
    <link rel="dns-prefetch" href="https://images.weserv.nl" />

    <!-- Preload de imagen LCP (la más grande del fold inicial) -->
    <link rel="preload" as="image" href="./menu-volcano.png" />

    <!-- Fuentes: una sola solicitud combinada con display=swap -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Be+Vietnam+Pro:wght@400;500;700;900&family=Anton&family=Bebas+Neue&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&display=swap"
    />

    <!-- Material Symbols: Carga estándar para asegurar compatibilidad total -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap"
    />

    <!-- Metadatos de Redes Sociales (Open Graph) -->
    <meta property="og:title" content="Menusclic | Menús Digitales QR para Restaurantes en CDMX" />
    <meta property="og:description" content="Digitaliza tu taquería, bar o restaurante en la CDMX. Actualiza precios al instante y dile adiós a los menús de papel tachados." />
    <meta property="og:image" content="./menu-volcano.png" />
    <meta property="og:url" content="https://laloehm.github.io/menusclic" />
    <meta property="og:type" content="website" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
